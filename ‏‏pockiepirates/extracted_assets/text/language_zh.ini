099000687=        《小小海贼》是一款以日本知名动漫《海贼王》为蓝本制作的同人网游.《海贼王》作为日本国民漫画自连载起至今已经陪广大动漫爱好者度过了16个年头,作为全球最畅销的漫画之一,今天我们推出一款手机平台的同人游戏《小小海贼》,玩家们通过智能手机就能随时随地的玩一把.\n        在这款游戏中,玩家将扮演一个初出茅庐的海贼,踏上成为海贼王之路.玩家需要通过建造自己的战船,招募自己的伙伴,提升自己和伙伴的实力,称霸海上世界.作为一款同人手游,故事的发展自然与原作是有着很大的区别的.动漫中那些传奇人物的命运,都将掌握在玩家的手中.\n        路飞、娜美、索隆等知名动漫角色将在今后的日子里陪伴玩家们达成成为海贼王的梦想.让我们一起做海贼王的男人吧.
